<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express — স্টেশনারি ও ডিজাইন শপ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap');

  :root {
    --mint: #6BBFB5;
    --mint-light: #A8D8D1;
    --cream: #FFF8EE;
    --peach: #F5E6D3;
    --coral: #E8836A;
    --gold: #D4A843;
    --teal-dark: #3A7D75;
    --text: #2C3E35;
    --text-light: #6B7A72;
    --white: #FFFFFF;
    --card-shadow: 0 4px 20px rgba(60,120,110,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== NAVBAR ===== */
  .navbar {
    background: var(--white);
    box-shadow: 0 2px 12px rgba(60,120,110,0.08);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center;
    padding: 0 24px; height: 64px; gap: 32px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.3rem; font-weight: 700; color: var(--teal-dark);
    text-decoration: none; white-space: nowrap;
  }
  .nav-logo .logo-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--mint); display: flex; align-items: center;
    justify-content: center; font-size: 1.4rem;
  }
  .nav-links {
    display: flex; gap: 8px; list-style: none;
  }
  .nav-links a {
    padding: 6px 14px; border-radius: 20px;
    color: var(--text-light); text-decoration: none;
    font-size: 0.9rem; font-weight: 500; transition: all .2s;
  }
  .nav-links a:hover, .nav-links a.active {
    background: var(--mint-light); color: var(--teal-dark);
  }
  .nav-search {
    margin-left: auto; display: flex; align-items: center;
    background: var(--peach); border-radius: 24px;
    padding: 6px 16px; gap: 8px; min-width: 200px;
  }
  .nav-search input {
    border: none; background: transparent; outline: none;
    font-family: 'Hind Siliguri', sans-serif; font-size: 0.9rem;
    color: var(--text); width: 100%;
  }
  .nav-search input::placeholder { color: var(--text-light); }
  .cart-btn {
    background: var(--mint); color: white; border: none;
    border-radius: 24px; padding: 8px 18px; cursor: pointer;
    font-size: 0.9rem; font-weight: 600; display: flex;
    align-items: center; gap: 6px; white-space: nowrap;
    transition: background .2s;
  }
  .cart-btn:hover { background: var(--teal-dark); }
  .cart-count {
    background: var(--coral); color: white; border-radius: 50%;
    width: 20px; height: 20px; font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* ===== PAGES ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== HERO / BANNER CAROUSEL ===== */
  .banner-section {
    position: relative; overflow: hidden;
    border-radius: var(--radius); margin: 20px;
    height: 260px;
  }
  .banner-slide {
    position: absolute; inset: 0; opacity: 0;
    transition: opacity 0.6s; display: flex;
    align-items: center; padding: 40px;
  }
  .banner-slide.active { opacity: 1; }
  .banner-slide:nth-child(1) { background: linear-gradient(120deg, #6BBFB5 0%, #A8D8D1 100%); }
  .banner-slide:nth-child(2) { background: linear-gradient(120deg, #F5E6D3 0%, #E8C9A0 100%); }
  .banner-slide:nth-child(3) { background: linear-gradient(120deg, #E8836A 0%, #F5B88A 100%); }
  .banner-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 900; color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    line-height: 1.2;
  }
  .banner-text p { color: rgba(255,255,255,0.85); margin-top: 10px; font-size: 1rem; }
  .banner-btn {
    margin-top: 18px; display: inline-block;
    background: white; color: var(--teal-dark);
    padding: 10px 24px; border-radius: 24px;
    font-weight: 700; text-decoration: none; cursor: pointer;
    border: none; font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem; transition: transform .2s;
  }
  .banner-btn:hover { transform: translateY(-2px); }
  .banner-emoji {
    position: absolute; right: 60px; top: 50%;
    transform: translateY(-50%);
    font-size: 7rem; opacity: 0.25;
    user-select: none;
  }
  .banner-dots {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 8px;
  }
  .banner-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.5); cursor: pointer;
    transition: background .2s;
  }
  .banner-dot.active { background: white; }

  /* ===== SECTIONS ===== */
  .section {
    padding: 8px 20px 24px;
  }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-num {
    width: 32px; height: 32px; background: var(--mint);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; color: white; font-weight: 700;
    font-size: 1rem; flex-shrink: 0;
  }
  .section-title {
    font-size: 1.15rem; font-weight: 700; letter-spacing: 1px;
    color: var(--text); text-transform: uppercase;
  }
  .section-see-all {
    margin-left: auto; color: var(--teal-dark); font-size: 0.85rem;
    cursor: pointer; font-weight: 600; text-decoration: none;
    border: none; background: none; padding: 4px 10px;
    border-radius: 20px; transition: background .2s;
  }
  .section-see-all:hover { background: var(--mint-light); }

  /* ===== CATEGORY GRID ===== */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .cat-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); overflow: hidden;
    cursor: pointer; transition: transform .2s, box-shadow .2s;
    display: flex; flex-direction: column;
    align-items: center; padding: 16px 12px 14px;
    text-align: center; border: 2px solid transparent;
  }
  .cat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(60,120,110,0.15);
    border-color: var(--mint-light);
  }
  .cat-icon { font-size: 2.8rem; margin-bottom: 10px; line-height: 1; }
  .cat-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }

  /* ===== PRODUCT GRID ===== */
  .prod-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .prod-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    display: flex; flex-direction: column;
  }
  .prod-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 32px rgba(60,120,110,0.18);
  }
  .prod-img-wrap {
    background: var(--peach); height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4.5rem; overflow: hidden; position: relative;
  }
  .prod-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; inset: 0;
  }
  .prod-img-emoji { z-index: 1; }
  .prod-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--coral); color: white;
    font-size: 0.7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 12px;
  }
  .prod-body { padding: 12px; flex: 1; display: flex; flex-direction: column; }
  .prod-code { font-size: 0.72rem; color: var(--text-light); font-weight: 600; margin-bottom: 4px; }
  .prod-name { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
  .prod-desc { font-size: 0.78rem; color: var(--text-light); margin-bottom: 8px; line-height: 1.4; flex: 1; }
  .prod-price { font-size: 1rem; font-weight: 700; color: var(--teal-dark); margin-bottom: 10px; }
  .prod-price span { font-size: 0.75rem; color: var(--text-light); text-decoration: line-through; margin-left: 6px; }
  .enquire-btn {
    background: var(--mint); color: white; border: none;
    border-radius: 8px; padding: 8px; font-weight: 700;
    font-size: 0.85rem; cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
    transition: background .2s; width: 100%;
  }
  .enquire-btn:hover { background: var(--teal-dark); }

  /* ===== CART SIDEBAR ===== */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; display: none;
  }
  .cart-overlay.open { display: block; }
  .cart-sidebar {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: min(400px, 95vw); background: white;
    z-index: 201; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .3s;
  }
  .cart-sidebar.open { transform: translateX(0); }
  .cart-head {
    padding: 20px; border-bottom: 1px solid #eee;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-head h2 { font-size: 1.1rem; font-weight: 700; }
  .close-btn {
    background: none; border: none; font-size: 1.5rem;
    cursor: pointer; color: var(--text-light); line-height: 1;
  }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
  .cart-item {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid #f0f0f0; align-items: flex-start;
  }
  .ci-icon { font-size: 2rem; background: var(--peach); border-radius: 8px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ci-info { flex: 1; }
  .ci-name { font-weight: 600; font-size: 0.9rem; }
  .ci-code { font-size: 0.75rem; color: var(--text-light); }
  .ci-qty {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--mint);
    background: white; color: var(--teal-dark); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 700; transition: background .2s;
  }
  .qty-btn:hover { background: var(--mint-light); }
  .qty-num { font-weight: 600; min-width: 20px; text-align: center; }
  .ci-price { font-weight: 700; color: var(--teal-dark); white-space: nowrap; }
  .ci-remove { color: var(--coral); cursor: pointer; font-size: 0.75rem; margin-left: 8px; border: none; background: none; }
  .cart-footer { padding: 20px; border-top: 1px solid #eee; }
  .cart-total { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 14px; font-size: 1.1rem; }
  .wa-btn {
    width: 100%; background: #25D366; color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: 'Hind Siliguri', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .2s;
  }
  .wa-btn:hover { background: #1EB357; }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
  .cart-empty .ce-icon { font-size: 3rem; margin-bottom: 12px; }

  /* ===== CATEGORY PAGE ===== */
  .page-header {
    background: linear-gradient(120deg, var(--mint) 0%, var(--mint-light) 100%);
    padding: 32px 24px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .back-btn {
    background: rgba(255,255,255,0.3); border: none; color: white;
    border-radius: 50%; width: 36px; height: 36px; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s; flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(255,255,255,0.5); }
  .page-header h1 { font-size: 1.5rem; font-weight: 700; color: white; }
  .page-header .ph-icon { font-size: 2.2rem; }

  /* ===== DESIGN CARD (portrait) ===== */
  .design-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px; padding: 0 20px 24px;
  }
  .design-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); overflow: hidden;
    transition: transform .2s;
  }
  .design-card:hover { transform: translateY(-4px); }
  .design-img {
    aspect-ratio: 2/3; background: var(--peach);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; position: relative; overflow: hidden;
  }
  .design-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .design-body { padding: 10px; }
  .design-code { font-size: 0.72rem; color: var(--text-light); font-weight: 600; }
  .design-name { font-weight: 600; font-size: 0.88rem; margin: 2px 0 6px; }
  .design-price { font-weight: 700; color: var(--teal-dark); font-size: 0.9rem; margin-bottom: 8px; }

  /* ===== ADMIN ===== */
  .admin-page {
    max-width: 900px; margin: 0 auto; padding: 24px;
  }
  .admin-login {
    max-width: 380px; margin: 80px auto;
    background: white; border-radius: 20px;
    padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    text-align: center;
  }
  .admin-login h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .admin-login p { color: var(--text-light); margin-bottom: 24px; font-size: 0.9rem; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); display: block; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; border: 1.5px solid #E0E8E5;
    border-radius: 10px; padding: 10px 14px;
    font-family: 'Hind Siliguri', sans-serif; font-size: 0.95rem;
    color: var(--text); outline: none; transition: border .2s;
    background: var(--cream);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--mint); }
  .field textarea { resize: vertical; min-height: 80px; }
  .btn-primary {
    background: var(--mint); color: white; border: none;
    border-radius: 10px; padding: 12px 24px; font-weight: 700;
    font-size: 0.95rem; cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif; transition: background .2s;
  }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-danger {
    background: #fee2e2; color: #ef4444; border: none;
    border-radius: 8px; padding: 6px 14px; font-size: 0.8rem;
    cursor: pointer; font-weight: 600; transition: background .2s;
  }
  .btn-danger:hover { background: #fca5a5; }
  .btn-secondary {
    background: var(--peach); color: var(--text); border: none;
    border-radius: 8px; padding: 8px 18px; font-weight: 600;
    font-size: 0.85rem; cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif; transition: background .2s;
  }
  .btn-secondary:hover { background: var(--mint-light); }
  .admin-tabs {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .admin-tab {
    padding: 8px 18px; border-radius: 20px; border: none;
    font-family: 'Hind Siliguri', sans-serif; font-size: 0.9rem;
    cursor: pointer; font-weight: 600; background: var(--peach);
    color: var(--text); transition: all .2s;
  }
  .admin-tab.active { background: var(--mint); color: white; }
  .admin-card {
    background: white; border-radius: var(--radius);
    padding: 24px; box-shadow: var(--card-shadow); margin-bottom: 20px;
  }
  .admin-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:600px) { .grid-2 { grid-template-columns: 1fr; } }
  .item-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 10px; background: var(--cream);
    margin-bottom: 8px;
  }
  .item-row .ir-icon { font-size: 1.5rem; width: 40px; text-align: center; flex-shrink: 0; }
  .item-row .ir-info { flex: 1; min-width: 0; }
  .item-row .ir-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-row .ir-sub { font-size: 0.75rem; color: var(--text-light); }
  .tag { display: inline-block; background: var(--mint-light); color: var(--teal-dark); border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; margin-right: 4px; }
  .alert { background: #d1fae5; color: #065f46; border-radius: 10px; padding: 12px 16px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
  .alert.show { display: block; }
  .alert.err { background: #fee2e2; color: #991b1b; }

  /* ===== FOOTER ===== */
  footer {
    background: var(--teal-dark); color: rgba(255,255,255,0.7);
    text-align: center; padding: 24px; margin-top: 40px;
    font-size: 0.85rem;
  }
  footer strong { color: white; }
  .footer-social { display: flex; justify-content: center; gap: 16px; margin-top: 10px; }
  .footer-social a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 1.2rem; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--mint-light); border-radius: 3px; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:640px) {
    .cat-grid { grid-template-columns: repeat(3, 1fr); }
    .prod-grid { grid-template-columns: repeat(2, 1fr); }
    .design-grid { grid-template-columns: repeat(2, 1fr); }
    .banner-emoji { display: none; }
    .banner-section { height: 200px; margin: 12px; }
    .banner-text h1 { font-size: 1.4rem; }
    .nav-links { display: none; }
    .nav-search { min-width: 120px; }
  }
  @media(max-width:400px) {
    .cat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Image upload preview */
  .img-preview {
    width: 80px; height: 80px; border-radius: 10px;
    object-fit: cover; border: 2px solid var(--mint-light);
    display: none;
  }
  .img-preview.show { display: block; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: var(--radius);
    padding: 28px; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--teal-dark); color: white;
    padding: 12px 20px; border-radius: 10px; font-size: 0.88rem;
    z-index: 400; transform: translateY(20px); opacity: 0;
    transition: all .3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .wa-float {
    position: fixed; bottom: 24px; left: 24px; z-index: 150;
    background: #25D366; color: white; border-radius: 50%;
    width: 56px; height: 56px; display: flex; align-items: center;
    justify-content: center; font-size: 1.6rem; box-shadow: 0 4px 16px rgba(37,211,102,0.4);
    cursor: pointer; text-decoration: none; border: none;
    transition: transform .2s;
  }
  .wa-float:hover { transform: scale(1.1); }

  /* ===== CARD ACTION BUTTONS (edit/delete on card, shop view) ===== */
  .card-clickable { cursor: pointer; }
  .prod-card-actions, .design-card-actions {
    position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 5;
  }
  .mini-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.95); cursor: pointer; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: transform .15s;
  }
  .mini-btn:hover { transform: scale(1.1); }

  /* ===== IMAGE UPLOAD ===== */
  .img-upload-box {
    border: 2px dashed var(--mint-light); border-radius: 12px;
    padding: 16px; text-align: center; cursor: pointer;
    background: var(--cream); transition: border-color .2s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .img-upload-box:hover { border-color: var(--mint); }
  .img-upload-box input[type=file] { display: none; }
  .img-upload-status { font-size: 0.78rem; color: var(--text-light); }
  .img-thumbs { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .img-thumb-wrap { position: relative; }
  .img-thumb-wrap .img-preview { display: block; width: 70px; height: 70px; }
  .img-thumb-remove {
    position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
    border-radius: 50%; background: var(--coral); color: white; border: none;
    font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;

<script>
  // ============================================================

<script>
// ============================================================
// লাইভ ডেটা স্টোর (Firestore থেকে রিয়েল-টাইম আসে)
// ============================================================
let store = {
  config: { shopName: 'দোকান', tagline: '', waNum: '', fb: '', ig: '', logo: '' },
  banners: [],
  occasionCats: [],
  occasionItems: [],
  stationeryCats: [],
  stationeryItems: []
};

function sortByCreated(arr) {
  return arr.slice().sort((a, b) => {
    const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
    const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
    return ta - tb;
  });
}

function renderAll() {
  updateGlobalUI();
  renderHome();
  renderOccasions();
  renderStationery();
  if (document.getElementById('product-detail').classList.contains('active')) renderProductDetail();
}

// Settings
db.collection('settings').doc('main').onSnapshot(doc => {
  if (doc.exists) store.config = { ...store.config, ...doc.data() };
  renderAll();
}, err => console.error('settings listener error:', err));

// Banners
db.collection('banners').onSnapshot(snap => {
  store.banners = sortByCreated(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  renderBanners();
}, err => console.error('banners listener error:', err));

// Categories
db.collection('categories').where('type', '==', 'occasion').onSnapshot(snap => {
  store.occasionCats = sortByCreated(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  renderAll();
}, err => console.error('occasion cats listener error:', err));

db.collection('categories').where('type', '==', 'stationery').onSnapshot(snap => {
  store.stationeryCats = sortByCreated(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  renderAll();
}, err => console.error('stationery cats listener error:', err));

// Items
db.collection('items').where('type', '==', 'occasion').onSnapshot(snap => {
  store.occasionItems = sortByCreated(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  renderAll();
}, err => console.error('occasion items listener error:', err));

db.collection('items').where('type', '==', 'stationery').onSnapshot(snap => {
  store.stationeryItems = sortByCreated(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  renderAll();
}, err => console.error('stationery items listener error:', err));

function updateGlobalUI() {
  const cfg = store.config;
  document.getElementById('shopNameDisplay').textContent = cfg.shopName;
  document.getElementById('footerShopName').textContent = cfg.shopName;
  document.getElementById('footerShopName2').textContent = cfg.shopName;
  document.title = cfg.shopName + ' — স্টেশনারি ও ডিজাইন শপ';
  if (cfg.fb) document.getElementById('footerFb').href = cfg.fb;
  if (cfg.ig) document.getElementById('footerIg').href = cfg.ig;
  document.getElementById('waFloat').href = cfg.waNum ? `https://wa.me/${cfg.waNum}` : '#';
  const logoImg = document.getElementById('logoImg');
  if (cfg.logo) { logoImg.src = cfg.logo; logoImg.style.display = 'block'; }
  else { logoImg.style.display = 'none'; }
}

// ============================================================
// NAVIGATION
// ============================================================
let pageHistory = ['home'];

function showPage(id, opts) {
  opts = opts || {};
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (!opts.skipHistory) {
    if (pageHistory[pageHistory.length - 1] !== id) pageHistory.push(id);
  }
  window.scrollTo(0, 0);
}

function goBackFrom(currentId) {
  if (pageHistory[pageHistory.length - 1] === currentId) pageHistory.pop();
  const prev = pageHistory.length ? pageHistory[pageHistory.length - 1] : 'home';
  showPage(prev, { skipHistory: true });
}

// ============================================================
// BANNER
// ============================================================
let bannerIdx = 0;
let bannerTimer = null;

function renderBanners() {
  const sec = document.getElementById('bannerSection');
  if (!store.banners.length) { sec.innerHTML = ''; return; }
  sec.innerHTML = store.banners.map((b, i) => `
    <div class="banner-slide ${i === 0 ? 'active' : ''}" ${b.img ? `style="background-image:linear-gradient(rgba(0,0,0,0.25),rgba(0,0,0,0.25)),url('${b.img}');background-size:cover;background-position:center;"` : ''}>
      <div class="banner-text">
        <h1>${b.title}</h1>
        <p>${b.desc || ''}</p>
        <button class="banner-btn" onclick="showPage('occasions')">${b.btn || 'দেখুন'}</button>
      </div>
      ${!b.img ? `<div class="banner-emoji">${b.emoji || '🎨'}</div>` : ''}
    </div>
  `).join('') + `<div class="banner-dots">${store.banners.map((_, i) => `<div class="banner-dot ${i === 0 ? 'active' : ''}" onclick="goBanner(${i})"></div>`).join('')}</div>`;

  bannerIdx = 0;
  clearInterval(bannerTimer);
  if (store.banners.length > 1) {
    bannerTimer = setInterval(() => goBanner((bannerIdx + 1) % store.banners.length), 4000);
  }
}

function goBanner(idx) {
  const slides = document.querySelectorAll('.banner-slide');
  const dots = document.querySelectorAll('.banner-dot');
  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  bannerIdx = idx;
}

// ============================================================
// HOME
// ============================================================
function renderHome() {
  renderBanners();

  const og = document.getElementById('occasionCatGrid');
  og.innerHTML = store.occasionCats.length ? store.occasionCats.map(c => `
    <div class="cat-card" onclick="goOccasionCat('${c.id}')">
      <div class="cat-icon">${c.emoji}</div>
      <div class="cat-name">${c.name}</div>
    </div>
  `).join('') : '<p style="color:#6B7A72;font-size:0.9rem;">এখনো কোনো ক্যাটাগরি যোগ করা হয়নি।</p>';

  const sg = document.getElementById('statCatGrid');
  sg.innerHTML = store.stationeryCats.length ? store.stationeryCats.map(c => `
    <div class="cat-card" onclick="goStatCat('${c.id}')">
      <div class="cat-icon">${c.emoji}</div>
      <div class="cat-name">${c.name}</div>
    </div>
  `).join('') : '<p style="color:#6B7A72;font-size:0.9rem;">এখনো কোনো ক্যাটাগরি যোগ করা হয়নি।</p>';
}

function goOccasionCat(catId) {
  showPage('occasions');
  setTimeout(() => scrollToCat('occ-cat-' + catId), 100);
}

function goStatCat(catId) {
  showPage('stationery');
  setTimeout(() => scrollToCat('st-cat-' + catId), 100);
}

function scrollToCat(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// OCCASIONS
// ============================================================
function renderOccasions() {
  const cont = document.getElementById('occasionContent');
  if (!store.occasionCats.length) {
    cont.innerHTML = '<p style="padding:40px;text-align:center;color:#6B7A72;">এখনো কোনো উপলক্ষ যোগ করা হয়নি।</p>';
    return;
  }
  cont.innerHTML = store.occasionCats.map(cat => {
    const items = store.occasionItems.filter(i => i.catId === cat.id);
    if (!items.length) return '';
    return `
      <div id="occ-cat-${cat.id}" class="section" style="padding-top:20px;">
        <div class="section-header">
          <div class="section-num">${cat.emoji}</div>
          <span class="section-title">${cat.name}</span>
        </div>
        <div class="design-grid">
          ${items.map(item => {
            const mainImg = (item.images && item.images[0]) || item.img || '';
            return `
            <div class="design-card card-clickable" onclick="openProductDetail('occ','${item.id}')">
              <div class="design-img">
                ${mainImg ? `<img src="${mainImg}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
                <span>${item.emoji || '🎨'}</span>
              </div>
              <div class="design-body">
                <div class="design-code">${item.code || ''}</div>
                <div class="design-name">${item.name}</div>
                ${item.desc ? `<div class="prod-desc">${item.desc}</div>` : ''}
                ${item.colors && item.colors.length ? `<div class="color-tag-list" style="margin:6px 0;">${item.colors.slice(0, 5).map(c => `<span class="cdot" style="background:${c.hex};width:14px;height:14px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,0.1);"></span>`).join('')}</div>` : ''}
                <div class="design-price">৳${Number(item.price).toLocaleString()}</div>
                <button class="enquire-btn" onclick="event.stopPropagation();openProductDetail('occ','${item.id}')">
                  বিস্তারিত দেখুন 🛒
                </button>
              </div>
            </div>
          `; }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// STATIONERY
// ============================================================
function renderStationery() {
  const cont = document.getElementById('stationeryContent');
  if (!store.stationeryCats.length) {
    cont.innerHTML = '<p style="padding:40px;text-align:center;color:#6B7A72;">এখনো কোনো পণ্য যোগ করা হয়নি।</p>';
    return;
  }
  cont.innerHTML = store.stationeryCats.map(cat => {
    const items = store.stationeryItems.filter(i => i.catId === cat.id);
    if (!items.length) return '';
    return `
      <div id="st-cat-${cat.id}" class="section" style="padding-top:20px;">
        <div class="section-header">
          <div class="section-num">${cat.emoji}</div>
          <span class="section-title">${cat.name}</span>
        </div>
        <div class="prod-grid">
          ${items.map(item => {
            const mainImg = (item.images && item.images[0]) || item.img || '';
            return `
            <div class="prod-card card-clickable" onclick="openProductDetail('stat','${item.id}')">
              <div class="prod-img-wrap">
                ${mainImg ? `<img src="${mainImg}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
                <span class="prod-img-emoji">${item.emoji || '📦'}</span>
                ${item.stock !== undefined && item.stock < 10 ? `<div class="prod-badge">সীমিত স্টক</div>` : ''}
              </div>
              <div class="prod-body">
                <div class="prod-code">${item.code || ''}</div>
                <div class="prod-name">${item.name}</div>
                ${item.desc ? `<div class="prod-desc">${item.desc}</div>` : ''}
                ${item.colors && item.colors.length ? `<div class="color-tag-list" style="margin:6px 0;">${item.colors.slice(0, 5).map(c => `<span class="cdot" style="background:${c.hex};width:14px;height:14px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,0.1);"></span>`).join('')}</div>` : ''}
                <div class="prod-price">৳${Number(item.price).toLocaleString()}</div>
                <button class="enquire-btn" onclick="event.stopPropagation();openProductDetail('stat','${item.id}')">
                  বিস্তারিত দেখুন 🛒
                </button>
              </div>
            </div>
          `; }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// PRODUCT DETAIL PAGE
// ============================================================
let pdState = { type: null, id: null, selectedColor: '', qty: 1, activeImgIdx: 0 };

function openProductDetail(type, id) {
  pdState = { type, id, selectedColor: '', qty: 1, activeImgIdx: 0 };
  showPage('product-detail');
  renderProductDetail();
}

function getItemByTypeId(type, id) {
  const list = type === 'occ' ? store.occasionItems : store.stationeryItems;
  return list.find(i => i.id === id);
}

function renderProductDetail() {
  const item = getItemByTypeId(pdState.type, pdState.id);
  const wrap = document.getElementById('pdContent');
  if (!item) { wrap.innerHTML = '<p style="padding:24px;">পণ্যটি পাওয়া যায়নি।</p>'; return; }
  const images = (item.images && item.images.length) ? item.images : (item.img ? [item.img] : []);
  const isStat = pdState.type === 'stat';
  const stockOk = !isStat || (item.stock === undefined || item.stock > 0);

  wrap.innerHTML = `
    <div>
      <div class="pd-gallery-main" id="pdGalleryMain">
        ${images.length ? `<img src="${images[pdState.activeImgIdx]}" onerror="this.style.display='none'">` : `<span>${item.emoji || '🎨'}</span>`}
      </div>
      ${images.length > 1 ? `<div class="pd-thumbs-row">${images.map((url, i) => `<div class="pd-thumb ${i === pdState.activeImgIdx ? 'active' : ''}" onclick="setPdActiveImg(${i})"><img src="${url}" onerror="this.style.display='none'"></div>`).join('')}</div>` : ''}
    </div>
    <div>
      <div class="pd-code">পণ্য কোড: ${item.code || ''}</div>
      <div class="pd-title">${item.name}</div>
      <div class="pd-price">৳${Number(item.price).toLocaleString()}</div>
      ${isStat ? `<div class="pd-stock ${stockOk ? (item.stock < 10 ? 'low' : 'in') : 'low'}">${stockOk ? `✅ স্টকে আছে (${item.stock} টি)` : '❌ স্টক নেই'}</div>` : ''}
      ${item.desc ? `<div class="pd-desc-block">${item.desc}</div>` : ''}

      ${item.colors && item.colors.length ? `
        <div class="pd-section-label">কালার বেছে নিন</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          ${item.colors.map(c => `<div class="pd-color-opt ${pdState.selectedColor === c.name ? 'selected' : ''}" style="background:${c.hex}" title="${c.name}" onclick="selectPdColor('${c.name.replace(/'/g, "\\'")}')"></div>`).join('')}
        </div>
        ${pdState.selectedColor ? `<div style="font-size:0.85rem;margin-top:6px;color:var(--text-light);">নির্বাচিত: ${pdState.selectedColor}</div>` : `<div style="font-size:0.8rem;margin-top:6px;color:var(--coral);">একটি কালার বেছে নিন</div>`}
      ` : ''}

      <div class="pd-section-label">পরিমাণ</div>
      <div class="qty-select-row">
        <div class="qty-select-box">
          <button onclick="changePdQty(-1)">−</button>
          <span class="qval" id="pdQtyVal">${pdState.qty}</span>
          <button onclick="changePdQty(1)">+</button>
        </div>
      </div>

      <div class="pd-actions">
        <button class="btn-secondary" onclick="pdAddToCart()" style="flex:1;">🛒 কার্টে যোগ করুন</button>
        <button class="btn-primary" onclick="pdOrderNow()" style="flex:1;">💬 অর্ডার করুন</button>
      </div>
    </div>
  `;
}

function setPdActiveImg(i) { pdState.activeImgIdx = i; renderProductDetail(); }

function selectPdColor(name) {
  pdState.selectedColor = pdState.selectedColor === name ? '' : name;
  renderProductDetail();
}

function changePdQty(delta) {
  pdState.qty = Math.max(1, pdState.qty + delta);
  document.getElementById('pdQtyVal').textContent = pdState.qty;
}

function pdValidateColor(item) {
  if (item.colors && item.colors.length && !pdState.selectedColor) {
    showToast('⚠️ অনুগ্রহ করে একটি কালার বেছে নিন');
    return false;
  }
  return true;
}

function pdBuildCartItem(item) {
  const images = (item.images && item.images.length) ? item.images : (item.img ? [item.img] : []);
  return {
    id: pdState.type + '-' + item.id,
    type: pdState.type,
    code: item.code || '',
    name: item.name,
    price: item.price,
    emoji: item.emoji,
    img: images[0] || '',
    color: pdState.selectedColor || '',
    qty: pdState.qty
  };
}

function pdAddToCart() {
  const item = getItemByTypeId(pdState.type, pdState.id);
  if (!item) return;
  if (!pdValidateColor(item)) return;
  addToCart(pdBuildCartItem(item));
}

function pdOrderNow() {
  const item = getItemByTypeId(pdState.type, pdState.id);
  if (!item) return;
  if (!pdValidateColor(item)) return;
  addToCart(pdBuildCartItem(item));
  startOrderConfirm();
}

function doSearch(q) {
  if (!q.trim()) { showPage('home'); return; }
  const lq = q.toLowerCase();
  const allItems = [
    ...store.occasionItems.map(i => ({ ...i, type: 'occ' })),
    ...store.stationeryItems.map(i => ({ ...i, type: 'stat' }))
  ].filter(i =>
    i.name.toLowerCase().includes(lq) ||
    (i.code || '').toLowerCase().includes(lq) ||
    (i.desc || '').toLowerCase().includes(lq)
  );

  document.getElementById('searchTitle').textContent = `"${q}" — ${allItems.length}টি ফলাফল`;
  const res = document.getElementById('searchResults');
  res.innerHTML = allItems.length ? allItems.map(item => {
    const mainImg = (item.images && item.images[0]) || item.img || '';
    return `
    <div class="prod-card card-clickable" onclick="openProductDetail('${item.type}','${item.id}')">
      <div class="prod-img-wrap">
        ${mainImg ? `<img src="${mainImg}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
        <span class="prod-img-emoji">${item.emoji || '📦'}</span>
      </div>
      <div class="prod-body">
        <div class="prod-code">${item.code || ''}</div>
        <div class="prod-name">${item.name}</div>
        ${item.desc ? `<div class="prod-desc">${item.desc}</div>` : ''}
        <div class="prod-price">৳${Number(item.price).toLocaleString()}</div>
        <button class="enquire-btn" onclick="event.stopPropagation();openProductDetail('${item.type}','${item.id}')">
          বিস্তারিত দেখুন 🛒
        </button>
      </div>
    </div>
  `; }).join('') : '<p style="padding:40px;text-align:center;color:#6B7A72;">কোনো পণ্য পাওয়া যায়নি।</p>';

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('search-results').classList.add('active');
  if (pageHistory[pageHistory.length - 1] !== 'search-results') pageHistory.push('search-results');
}

// ============================================================
// CART
// ============================================================
let cart = [];

function addToCart(item) {
  const existing = cart.find(c => c.id === item.id && c.type === item.type && (c.color || '') === (item.color || ''));
  if (existing) { existing.qty += (item.qty || 1); }
  else { cart.push({ ...item, qty: item.qty || 1 }); }
  updateCartUI();
  showToast('✅ কার্টে যোগ হয়েছে!');
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty < 1) { cart.splice(idx, 1); }
  updateCartUI();
}

function updateCartUI() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cartCount').textContent = count;
  renderCartItems();
}

function renderCartItems() {
  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div class="ce-icon">🛒</div><p>কার্ট খালি আছে</p><p style="font-size:0.8rem;margin-top:6px;">পণ্য যোগ করুন</p></div>`;
    footer.innerHTML = '';
    return;
  }
  el.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="ci-icon">${item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" onerror="this.style.display='none'">` : (item.emoji || '📦')}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}${item.color ? ` <span class="tag">${item.color}</span>` : ''}</div>
        <div class="ci-code">${item.code}</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          <button class="ci-remove" onclick="removeFromCart(${i})">✕ সরান</button>
        </div>
      </div>
      <div class="ci-price">৳${(item.price * item.qty).toLocaleString()}</div>
    </div>
  `).join('');

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  footer.innerHTML = `
    <div class="cart-total"><span>মোট:</span><span>৳${total.toLocaleString()}</span></div>
    <button class="wa-btn" onclick="startOrderConfirm()">
      💬 অর্ডার নিশ্চিত করুন
    </button>
  `;
}

// ============================================================
// CUSTOMER INFO (asked once, saved on this device only)
// ============================================================
function getCustomer() {
  try { return JSON.parse(localStorage.getItem('shop_customer_info') || 'null'); } catch (e) { return null; }
}

function ensureCustomerThenProceed(afterFn) {
  const cust = getCustomer();
  if (cust && cust.name && cust.wa) {
    afterFn();
  } else {
    pendingAfterCustomer = afterFn;
    document.getElementById('cust-name').value = '';
    document.getElementById('cust-wa').value = '';
    document.getElementById('custInfoAlert').classList.remove('show');
    document.getElementById('custInfoModal').classList.add('open');
  }
}

let pendingAfterCustomer = null;

function saveCustomerInfo() {
  const name = document.getElementById('cust-name').value.trim();
  const wa = document.getElementById('cust-wa').value.trim();
  if (!name || !wa) {
    const el = document.getElementById('custInfoAlert');
    el.textContent = '❌ নাম ও WhatsApp নাম্বার দুটোই দিন';
    el.classList.add('show', 'err');
    return;
  }
  localStorage.setItem('shop_customer_info', JSON.stringify({ name, wa }));
  document.getElementById('custInfoModal').classList.remove('open');
  if (pendingAfterCustomer) { const fn = pendingAfterCustomer; pendingAfterCustomer = null; fn(); }
}

// ============================================================
// ORDER CONFIRMATION FLOW (writes order to Firestore)
// ============================================================
function startOrderConfirm() {
  if (!cart.length) { showToast('⚠️ কার্ট খালি আছে'); return; }
  ensureCustomerThenProceed(showOrderConfirmModal);
}

function showOrderConfirmModal() {
  const cust = getCustomer();
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const body = document.getElementById('orderConfirmBody');
  body.innerHTML = `
    <p style="margin-bottom:10px;">আপনি কি নিশ্চিতভাবে নিচের পণ্যগুলো অর্ডার করতে চান?</p>
    <div style="background:var(--cream);border-radius:10px;padding:12px;margin-bottom:10px;">
      ${cart.map(c => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #E8E0D2;"><span>${c.name}${c.color ? ' (' + c.color + ')' : ''} × ${c.qty}</span><span>৳${(c.price * c.qty).toLocaleString()}</span></div>`).join('')}
    </div>
    <div style="font-weight:700;display:flex;justify-content:space-between;"><span>মোট:</span><span>৳${total.toLocaleString()}</span></div>
    <p style="margin-top:10px;font-size:0.85rem;color:var(--text-light);">গ্রাহক: ${cust.name} (${cust.wa})</p>
  `;
  document.getElementById('orderConfirmBtn').onclick = confirmFullOrder;
  document.getElementById('orderConfirmModal').classList.add('open');
}

function confirmFullOrder() {
  const cust = getCustomer();
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const orderBtn = document.getElementById('orderConfirmBtn');
  orderBtn.disabled = true;
  orderBtn.textContent = 'দয়া করে অপেক্ষা করুন...';

  const order = {
    customerName: cust.name,
    customerWa: cust.wa,
    items: cart.map(c => ({ name: c.name, code: c.code || '', qty: c.qty, price: c.price, color: c.color || '' })),
    total,
    status: 'new',
    time: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('orders').add(order).then(() => {
    closeModal('orderConfirmModal');
    sendWhatsAppForOrder(order);
    cart = [];
    updateCartUI();
    toggleCart();
    showToast('✅ অর্ডার নিশ্চিত হয়েছে!');
  }).catch(err => {
    console.error('order save failed:', err);
    showToast('❌ অর্ডার সংরক্ষণ ব্যর্থ হয়েছে, আবার চেষ্টা করুন');
  }).finally(() => {
    orderBtn.disabled = false;
    orderBtn.textContent = 'হ্যাঁ, নিশ্চিত করুন ✅';
  });
}

function sendWhatsAppForOrder(order) {
  const num = store.config.waNum;
  const shopName = store.config.shopName;
  if (!num) return;
  let msg = `🛒 *${shopName}* — নতুন অর্ডার\n\n`;
  msg += `👤 গ্রাহকের নাম: ${order.customerName}\n`;
  msg += `📱 WhatsApp: ${order.customerWa}\n\n`;
  order.items.forEach(item => {
    msg += `▪ *${item.name}* (কোড: ${item.code})${item.color ? ` — কালার: ${item.color}` : ''}\n`;
    msg += `  পরিমাণ: ${item.qty} টি\n`;
    msg += `  মূল্য: ৳${(item.price * item.qty).toLocaleString()}\n\n`;
  });
  msg += `💰 *মোট: ৳${order.total.toLocaleString()}*\n\n`;
  msg += `---\nঅনুগ্রহ করে আমার অর্ডারটি নিশ্চিত করুন।`;
  const url = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function toggleCart() {
  const overlay = document.getElementById('cartOverlay');
  const sidebar = document.getElementById('cartSidebar');
  overlay.classList.toggle('open');
  sidebar.classList.toggle('open');
  renderCartItems();
}

// ============================================================
// HELPERS
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
